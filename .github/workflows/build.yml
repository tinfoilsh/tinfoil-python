name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build_linux:
    name: Build Linux wheels
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybindgen packaging

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y golang

      - name: Configure Go
        run: |
          echo "GOPATH=$HOME/go" >> $GITHUB_ENV
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Go tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/go-python/gopy@latest

      - name: Clone verifier repo
        uses: actions/checkout@v4
        with:
          repository: tinfoilsh/verifier
          ref: v0.0.21
          path: verifier

      - name: Generate Go bindings
        run: |
          cd verifier
          gopy build -output=tinfoil_verifier -vm=python3 github.com/tinfoilsh/verifier/client
          mv tinfoil_verifier ../tinfoil/
          cd ..
          rm -rf verifier

      - name: Build wheels
        run: |
          python -m pip install build
          python -m build
          python rename.py

      - name: Upload Linux wheels
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheels-${{ matrix.python }}
          path: dist/*.whl

  build_macos:
    name: Build macOS wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13-xlarge, macos-14]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybindgen packaging delocate

      - name: Install system dependencies
        run: |
          brew install go

      - name: Configure Go
        run: |
          echo "GOPATH=$HOME/go" >> $GITHUB_ENV
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Go tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/go-python/gopy@latest

      - name: Clone verifier repo
        uses: actions/checkout@v4
        with:
          repository: tinfoilsh/verifier
          ref: v0.0.21
          path: verifier

      - name: Generate Go bindings with proper RPATH and architecture
        run: |
          cd verifier

          # Set architecture based on runner
          if [ "${{ matrix.os }}" = "macos-13-xlarge" ]; then
            ARCH="amd64"
            ARCH_FLAG="x86_64"
          else
            ARCH="arm64"
            ARCH_FLAG="arm64"
          fi

          echo "Building for architecture: $ARCH ($ARCH_FLAG)"

          # Set environment variables for proper architecture-specific build
          export GOARCH=$ARCH
          export CGO_ENABLED=1
          export CGO_CFLAGS="-O2 -g -arch $ARCH_FLAG"
          export CGO_LDFLAGS="-Wl,-rpath,@loader_path -arch $ARCH_FLAG"

          # Use GOEXPERIMENT instead of GODEBUG for Go 1.23+
          export GOEXPERIMENT=cgocheck2

          # Print environment for debugging
          go env

          # Attempt simple build first (no tags)
          echo "Attempting build without explicit build tags..."
          gopy build -output=tinfoil_verifier -vm=python3 github.com/tinfoilsh/verifier/client

          # If first attempt fails, try with build tags
          if [ ! -d "tinfoil_verifier" ]; then
            echo "First attempt failed. Trying with build tags..."
            gopy build -output=tinfoil_verifier -vm=python3 -build-tags="darwin,$ARCH" github.com/tinfoilsh/verifier/client
          fi

          # If both attempts fail, try one more time with additional cgo tag
          if [ ! -d "tinfoil_verifier" ]; then
            echo "Second attempt failed. Trying with additional cgo tag..."
            gopy build -output=tinfoil_verifier -vm=python3 -build-tags="darwin,cgo,$ARCH" github.com/tinfoilsh/verifier/client
          fi

          # Check if the build succeeded
          if [ ! -d "tinfoil_verifier" ]; then
            echo "All build attempts failed. Directory listing:"
            ls -la
            exit 1
          fi

          # Verify the architecture of the built libraries
          echo "Checking architecture of built libraries:"
          find tinfoil_verifier -name "*.dylib" -exec file {} \;
          find tinfoil_verifier -name "*.so" -exec file {} \;

          # Move the built bindings
          mv tinfoil_verifier ../tinfoil/
          cd ..
          rm -rf verifier

      - name: Build wheels
        run: |
          python -m pip install build
          python -m build
          python rename.py

      - name: Check wheel contents and fix library paths
        run: |
          # Create directory for fixed wheels
          mkdir -p fixed_wheels

          # For each wheel file
          for whl in dist/*.whl; do
            echo "Processing wheel: $whl"
            
            # Extract wheel to temporary directory for inspection
            mkdir -p wheel_contents
            unzip -q "$whl" -d wheel_contents
            
            # Find and examine all dylib files in the wheel
            echo "Library files in wheel:"
            find wheel_contents -name "*.dylib" -o -name "*.so" -exec file {} \; -exec otool -L {} \; || true
            
            # Use delocate to fix library paths
            delocate-wheel -w fixed_wheels -v "$whl"
            
            # Clean up
            rm -rf wheel_contents
          done

          # Move fixed wheels back to dist directory
          mv fixed_wheels/* dist/ || echo "No fixed wheels to move"
          rm -rf fixed_wheels

      - name: Upload macOS wheels
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}-wheels-${{ matrix.python }}
          path: dist/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build_linux, build_macos, build_sdist]
    # Only run release job when a tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Organize artifacts
        run: |
          mkdir -p dist_final
          find dist -name "*.whl" -o -name "*.tar.gz" -exec cp {} dist_final/ \;
          ls -l dist_final

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_final/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_final/
