name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build_macos:
    name: Build macOS wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13-xlarge, macos-14]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      # Set up Python with specific settings to ensure consistency
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip" # Enable pip caching
          allow-prereleases: false
          check-latest: true # Ensure we get the exact version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybindgen packaging delocate build wheel setuptools

      # Print Python environment details for debugging
      - name: Debug Python environment
        run: |
          which python
          python --version
          python -c "import sys; print('Executable:', sys.executable)"
          python -c "import sys; print('Prefix:', sys.prefix)"
          python -c "import sysconfig; print('Include Dir:', sysconfig.get_path('include'))"

      - name: Install system dependencies
        run: |
          brew install go

      - name: Configure Go
        run: |
          echo "GOPATH=$HOME/go" >> $GITHUB_ENV
          echo "$HOME/go/bin" >> $GITHUB_PATH
          # Ensure Go environment is properly set
          go env GOARCH
          go env GOOS
          go env CGO_ENABLED

      - name: Install Go tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/go-python/gopy@latest

      - name: Clone verifier repo
        uses: actions/checkout@v4
        with:
          repository: tinfoilsh/verifier
          ref: v0.0.21
          path: verifier

      - name: Generate Go bindings with proper RPATH and architecture
        run: |
          cd verifier

          # Set architecture based on runner
          if [ "${{ matrix.os }}" = "macos-13-xlarge" ]; then
            ARCH="amd64"
            ARCH_FLAG="x86_64"
          else
            ARCH="arm64"
            ARCH_FLAG="arm64"
          fi

          echo "Building for architecture: $ARCH ($ARCH_FLAG)"

          # Get Python include path and library path
          PYTHON_INCLUDE=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          PYTHON_CONFIG=$(python-config --configdir)
          PYTHON_LIBRARY=$(python-config --ldflags | grep -o "/.*/libpython.*\.dylib" || echo "")

          echo "Python paths:"
          echo "Include: $PYTHON_INCLUDE"
          echo "Config: $PYTHON_CONFIG"
          echo "Library: $PYTHON_LIBRARY"

          # Set environment variables for proper architecture-specific build
          export GOARCH=$ARCH
          export CGO_ENABLED=1
          export CGO_CFLAGS="-O2 -g -arch $ARCH_FLAG -I$PYTHON_INCLUDE"
          export CGO_LDFLAGS="-Wl,-rpath,@loader_path/../.dylibs -arch $ARCH_FLAG"

          # Use GOEXPERIMENT instead of GODEBUG for Go 1.23+
          export GOEXPERIMENT=cgocheck2

          # Print environment for debugging
          go env
          env | grep CGO

          # Attempt build with explicit Python paths
          echo "Attempting build with explicit Python paths..."
          gopy build -output=tinfoil_verifier \
            -vm=python3 \
            -build-tags="$ARCH" \
            github.com/tinfoilsh/verifier/client

          # Verify the architecture of the built libraries
          echo "Checking architecture of built libraries:"
          find tinfoil_verifier -name "*.dylib" -exec file {} \;
          find tinfoil_verifier -name "*.so" -exec file {} \;

          # Move the built bindings
          mv tinfoil_verifier ../tinfoil/
          cd ..
          rm -rf verifier

      - name: Build wheels
        run: |
          python -m build
          python rename.py

      - name: Check wheel contents and fix library paths
        run: |
          # Create directory for fixed wheels
          mkdir -p fixed_wheels

          # For each wheel file
          for whl in dist/*.whl; do
            echo "Processing wheel: $whl"
            
            # Extract wheel to temporary directory for inspection
            mkdir -p wheel_contents
            unzip -q "$whl" -d wheel_contents
            
            # Find and examine all dylib files in the wheel
            echo "Library files in wheel:"
            find wheel_contents -name "*.dylib" -o -name "*.so" -exec file {} \; -exec otool -L {} \; || true
            
            # Use delocate to fix library paths with verbose output
            delocate-wheel -w fixed_wheels -v "$whl"
            
            # Verify the fixed wheel
            mkdir -p fixed_contents
            unzip -q "fixed_wheels/$(basename "$whl")" -d fixed_contents
            echo "Fixed wheel contents:"
            find fixed_contents -name "*.dylib" -o -name "*.so" -exec file {} \; -exec otool -L {} \; || true
            
            # Clean up
            rm -rf wheel_contents fixed_contents
          done

          # Move fixed wheels back to dist directory
          mv fixed_wheels/* dist/ || echo "No fixed wheels to move"
          rm -rf fixed_wheels

      - name: Upload macOS wheels
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}-wheels-${{ matrix.python }}
          path: dist/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build_macos, build_sdist]
    # Only run release job when a tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Organize artifacts
        run: |
          mkdir -p dist_final
          find dist -name "*.whl" -o -name "*.tar.gz" -exec cp {} dist_final/ \;
          ls -l dist_final

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_final/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_final/
